version: '3.8'

services:
  catalogdb:
   image: postgres
   
  basketdb:
    image: postgres
  
  distributedcache:
    image: redis
    
  orderdb:
    image: mcr.microsoft.com/mssql/server

  catalog.api:
    image: catalog.api
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.Api/Dockerfile
  basket.api:
    image: basket.api
    build:
      context: .
      dockerfile: Services/Basket/Basket.Api/Dockerfile
  discount.grpc:
    image: discount.grpc
    build:
      context: .
      dockerfile: Services/Discount/Discount.Grpc/Dockerfile
  ordering.api:
    image: ordering.api
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.Api/Dockerfile



volumes: 
  postgres_catalog:
  postgres_basket:
  
  shopping.web:
    image: shopping.web
    build:
      context: .
      dockerfile: WebApps/Shopping.Web/Dockerfile

  shopping.web:
    image: shopping.web
    build:
      context: .
      dockerfile: WebApps/Shopping.Web/Dockerfile
